<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>SPMB Multi Step</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-header">
  <h1>Formulir Pendaftaran SPMB Online</h1>
  <p class="tahun">TAHUN AJARAN: 2026/2027</p>
  <p class="info">Isi data dengan lengkap dan benar.</p>
</div>
<div class="form-box">

  <!-- PROGRESS -->
  <div class="progress">
    <div class="step active">1</div>
    <div class="step">2</div>
    <div class="step">3</div>
  </div>

  <form id="formSPMB">

<!-- STEP 1 -->
<div class="form-step active">

  <h2>Data Pribadi</h2>

  <div class="grid-2">

    <div class="field">
  <label>Nama Lengkap</label>
  <input type="text" required>
</div>
    

    <div class="field">
  <label>Nama Panggilan</label>
  <input type="text" required>
    </div>

    <select required>
      <option value="">-- Pilih Jenis Kelamin --</option>
      <option>Laki-laki</option>
      <option>Perempuan</option>
    </select>

    <div class="field">
  <label>Tempat Lahir</label>
  <input type="text" required>
</div>
    
    <div class="field">
  <label>Tanggal Lahir</label>
  <input type="date" required>
</div>
    

    <select required>
      <option value="">-- Pilih Agama --</option>
      <option>Islam</option>
      <option>Kristen</option>
      <option>Katolik</option>
      <option>Hindu</option>
      <option>Buddha</option>
      <option>Konghucu</option>
    </select>

    

    <select required>
      <option value="">-- Pilih Golongan Darah --</option>
      <option>A</option>
      <option>B</option>
      <option>AB</option>
      <option>O</option>
    </select>
    
<div class="field">
  <label>Tinggi Badan (cm)</label>
  <input type="text" required>
</div>
    
    
      
      <div class="field">
  <label>Berat Badan (kg</label>
  <input type="text" required>
</div>
    
      <div class="field">
  <label>Lingkar Kepala (cm)</label>
  <input type="text" required>
</div>
      
    
      
      <div class="field">
  <label>Anak ke</label>
  <input type="text" required>
</div>

    

    <select required>
      <option value="">-- Status dalam keluarga --</option>
      <option>Anak Kandung</option>
      <option>Anak Angkat</option>
    </select>

     
    
      <div class="field">
  <label>Jumlah Kakak</label>
  <input type="text" required>
</div>
      
    
      
      <div class="field">
  <label>Jumlah Adik</label>
  <input type="text" required>
</div>

  
      <div class="field">
  <label>Asal SD</label>
  <input type="text" required>
</div>
    

<div class="field">
  <label>Alamat SD</label>
  <input type="text" required>
</div>

    
      <div class="field">
  <label>Alamat Tempat Tinggal</label>
  <input type="text" required>
</div>
      
    

      <div class="field">
  <label>Kelurahan</label>
  <input type="text" required>
</div>
    
      
<div class="field">
  <label>Kecamatan</label>
  <input type="text" required>
</div>
    
      
      <div class="field">
  <label>Kode Pos</label>
  <input type="text" required>
</div>

    
      
      <div class="field">
  <label>Jarak ke Sekolah (km)</label>
  <input type="text" required>
</div>
    
      
      <div class="field">
  <label>Waktu Tempuh (menit)</label>
  <input type="text" required>
</div>

  </div>

  <button type="button" class="next">Lanjut</button>

</div>

  <!-- STEP 2 -->
<div class="form-step">

  <h2>Data Orang Tua / Wali</h2>

  <!-- ================= AYAH ================= -->
  <h3 class="section-title">Data Ayah</h3>

  <div class="grid-2">

    <div class="field">
      <label>Nama Ayah</label>
      <input type="text" required>
    </div>

    <div class="field">
      <label>Tempat Lahir</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Tanggal Lahir</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Agama</label>
      <select>
        <option value="">-- Pilih Agama --</option>
        <option>Islam</option>
        <option>Kristen</option>
        <option>Katolik</option>
        <option>Hindu</option>
        <option>Buddha</option>
        <option>Konghucu</option>
        <option>Lainnya</option>
      </select>
    </div>

    <div class="field">
      <label>Pendidikan Terakhir</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Pekerjaan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Golongan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Jabatan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Alamat Tempat Kerja</label>
      <input type="text">
    </div>

    <div class="field">
      <label>No Telepon</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Penghasilan / Bulan</label>
      <input type="number">
    </div>

  </div>

  <!-- ================= IBU ================= -->
  <h3 class="section-title">Data Ibu</h3>

  <div class="grid-2">

    <div class="field">
      <label>Nama Ibu</label>
      <input type="text" required>
    </div>

    <div class="field">
      <label>Tempat Lahir</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Tanggal Lahir</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Agama</label>
      <select>
        <option value="">-- Pilih Agama --</option>
        <option>Islam</option>
        <option>Kristen</option>
        <option>Katolik</option>
        <option>Hindu</option>
        <option>Buddha</option>
        <option>Konghucu</option>
        <option>Lainnya</option>
      </select>
    </div>

    <div class="field">
      <label>Pendidikan Terakhir</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Pekerjaan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Golongan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Jabatan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Alamat Tempat Kerja</label>
      <input type="text">
    </div>

    <div class="field">
      <label>No Telepon</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Penghasilan / Bulan</label>
      <input type="number">
    </div>

  </div>

  <!-- ================= WALI ================= -->
  <h3 class="section-title">Data Wali (Jika Ada)</h3>

  <div class="grid-2">

    <div class="field">
      <label>Nama Ayah Wali</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Nama Ibu Wali</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Alamat Rumah</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Pekerjaan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Golongan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Nama Tempat Kerja</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Jabatan</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Alamat Tempat Kerja</label>
      <input type="text">
    </div>

  </div>

  <!-- BUTTON -->
  <button type="button" class="prev">Kembali</button>
  <button type="button" class="next">Lanjut</button>

</div>

    <!-- STEP 3 -->
    <div class="form-step">
      <h2>Upload Foto</h2>

      <label>Foto 3x4</label>
      <input type="file" required>

      <label>Foto 4x6</label>
      <input type="file" required>

      <button type="button" class="prev">Kembali</button>
      <button type="submit">Kirim</button>
    </div>

  </form>

</div>

<script src="app.js"></script>
</body>
</html>
