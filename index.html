<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPMB SMP Kembangan 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACKGROUND -->
<div class="background">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="logo">
    <span class="dot"></span>
    <h2>SPMB SMP Kembangan</h2>
  </div>

  <ul>
    <li><a href="index.html">Beranda</a></li>
    <li><a href="tentang.html">Tentang</a></li>
  </ul>

</nav>

<!-- HERO -->
<section class="hero" id="home">

  <div class="hero-card">

    <p class="tag">PENERIMAAN SISWA BARU 2026</p>

    <h1>
      SPMB <span>SMP Kembangan</span>
    </h1>

    <p class="desc">
      Sistem pendaftaran online modern, cepat, dan mudah digunakan.<br>

    </p>

    <a href="pendaftaran.html" class="btn">DAFTAR SEKARANG</a>

  <h2>Dashboard Admin</h2>

  <div class="card-info">
    Total Pendaftar: <span id="total"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Nomor</th>
        <th>Nama</th>
        <th>NIK</th>
        <th>Asal</th>
        <th>Status</th>
        <th>Aksi</th>
      </tr>
    </thead>

    <tbody id="tableData"></tbody>
  </table>

  <button onclick="hapusSemua()">Hapus Semua</button>

</section>

<script src="app.js"></script>
